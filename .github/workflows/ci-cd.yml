name: Build, Test & Push Docker Image

on:
  push:
    branches:
      - jazzy-devel
  pull_request:
    branches:
      - jazzy-devel
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      # Package Configuration - Define your ROS2 packages here
      CPP_PACKAGES: ""
      PY_PACKAGES: "audio_stream_manager speech_recognition"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Clone EutRobAIDockers repository to build base image
      - name: Clone EutRobAIDockers repository
        run: |
          git clone https://github.com/Eurecat/EutRobAIDockers.git
          cd EutRobAIDockers
          echo "✅ EutRobAIDockers repository cloned successfully"
      
      # Build the base image (eut_ros_vulcanexus_torch:jazzy)
      - name: Build base image from EutRobAIDockers
        run: |
          cd EutRobAIDockers/Docker
          chmod +x build_container.sh
          ./build_container.sh --vulcanexus
        env:
          DOCKER_BUILDKIT: 1
      
      # Verify base image was built successfully
      - name: Verify base image was built
        run: |
          if docker images | grep -q "eut_ros_vulcanexus_torch.*jazzy"; then
            echo "✅ Base image eut_ros_vulcanexus_torch:jazzy successfully built"
            docker images eut_ros_vulcanexus_torch:jazzy
          else
            echo "❌ Base image eut_ros_vulcanexus_torch:jazzy not found"
            echo "Available images:"
            docker images
            exit 1
          fi
      
      # Not needed atm, also because this approach would allow just a git op within the same repo (useless) 
      # we should setup Multiple Repos Using a GitHub App
      # - name: Set up SSH agent
      #   uses: webfactory/ssh-agent@v0.9.0
      #   with:
      #     ssh-private-key: ${{ secrets.PRIVATE_ACTIONS_DEPLOY }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Make build script executable
        run: chmod +x Docker/build_container.sh
      
      # Build the eut_speech Docker image (depends on base image)
      - name: Build eut_speech Docker image
        run: cd ./Docker && ./build_container.sh
        env:
          DOCKER_BUILDKIT: 1
      
      - name: Verify eut_speech image was built
        run: |
          if docker images | grep -q "eut_ros_torch.*jazzy"; then
            echo "✅ eut_speech image eut_ros_torch:jazzy successfully built"
            docker images eut_ros_torch:jazzy
          else
            echo "❌ eut_speech image eut_ros_torch:jazzy not found"
            echo "Available images:"
            docker images
            exit 1
          fi
        
      # 🔧 Build workspace and run test
      - name: Build & test workspace
        run: |
          source Docker/.env
          
          # Build all packages
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${BUILT_IMAGE} \
            bash -c "
              source /opt/ros/${TARGET_DISTRO}/setup.bash
              
              # Build all C++ packages with coverage flags (colcon handles multiple packages)
              echo '🔨 Building C++ packages: ${{ env.CPP_PACKAGES }}'
              colcon build --symlink-install \
                --packages-select ${{ env.CPP_PACKAGES }} \
                --cmake-args -DCMAKE_CXX_FLAGS='--coverage' \
                             -DCMAKE_C_FLAGS='--coverage' \
                             -DCMAKE_EXE_LINKER_FLAGS='--coverage'
              
              # Build all Python packages
              echo '🔨 Building Python packages: ${{ env.PY_PACKAGES }}'
              colcon build --symlink-install \
                --packages-select ${{ env.PY_PACKAGES }}
              
              # Run all tests
              echo '🧪 Running tests for all packages...'
              colcon test \
                --event-handlers console_direct+ \
                --pytest-args '-v' \
                --return-code-on-test-failure || true
            "

      # Generate human-readable test summary
      - name: Generate test summary
        if: always()
        run: |
          source Docker/.env
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${BUILT_IMAGE} \
            bash -c "source /opt/ros/${TARGET_DISTRO}/setup.bash && \
                     colcon test-result --all --verbose" > test_summary.txt
          
          # Display in logs
          cat test_summary.txt
          
          # Create GitHub Actions summary
          echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat test_summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      - name: Generate test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: ROS 2 Tests
          path: 'build/*/test_results/**/*.xml,build/*/pytest.xml'
          reporter: java-junit
          fail-on-error: false
      
      # Upload test result
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/*/test_results/**/*.xml
            build/*/pytest.xml
            log/latest_test/**/*.log
            test_summary.txt
      
      # Create test badge (for README)
      - name: Create test badge
        if: always() && github.ref == 'refs/heads/jazzy-devel'
        run: |
          # Parse the summary line from test_summary.txt
          # Example line: "Summary: 55 tests, 0 errors, 0 failures, 6 skipped"
          if [ -f test_summary.txt ]; then
            SUMMARY_LINE=$(grep "^Summary:" test_summary.txt)
            
            # Extract numbers using grep and cut
            TOTAL=$(echo "$SUMMARY_LINE" | grep -oP '\d+(?= tests)' || echo "0")
            FAILURES=$(echo "$SUMMARY_LINE" | grep -oP '\d+(?= failures)' || echo "0")
            ERRORS=$(echo "$SUMMARY_LINE" | grep -oP '\d+(?= errors)' || echo "0")
            
            # Calculate passed tests (total - failures - errors)
            PASSED=$((TOTAL - FAILURES - ERRORS))
            FAILED=$((FAILURES + ERRORS))
            
            echo "📊 Badge stats: $PASSED passed / $FAILED failed (out of $TOTAL total)"
          else
            echo "⚠️ test_summary.txt not found, using defaults"
            PASSED=0
            FAILED=0
          fi
          
          # Create badge JSON (shields.io endpoint format)
          COLOR="success"
          if [ $FAILED -gt 0 ]; then
            COLOR="critical"
          fi
          
          echo "{\"schemaVersion\": 1, \"label\": \"tests\", \"message\": \"$PASSED passed / $FAILED failed\", \"color\": \"$COLOR\"}" > test-badge.json
          
          cat test-badge.json

      - name: Upload badge data
        if: always() && github.ref == 'refs/heads/jazzy-devel'
        uses: actions/upload-artifact@v4
        with:
          name: test-badge
          path: test-badge.json
      

      # Generate code coverage reports
      - name: Generate coverage reports
        if: always()
        run: |
          source Docker/.env
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${BUILT_IMAGE} \
            bash -c "/ci_cd_coverage.sh" \
            > coverage_summary.txt || true
          
          # Display in logs
          cat coverage_summary.txt
          
          # Add to GitHub Actions summary
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage_summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      # Convert lcov to Cobertura XML for better tool compatibility
      - name: Convert coverage to Cobertura XML
        if: always()
        run: |
          python3 -m pip install lcov_cobertura
          
          # Convert C++ coverage for all packages
          for pkg in ${{ env.CPP_PACKAGES }}; do
            if [ -f "build/${pkg}/coverage_filtered.info" ]; then
              python3 -m lcov_cobertura build/${pkg}/coverage_filtered.info -o coverage-cpp-${pkg}.xml
              echo "✅ Converted C++ coverage for ${pkg} to XML"
            fi
          done
          
          # Convert Python coverage for all packages
          for pkg in ${{ env.PY_PACKAGES }}; do
            if [ -f "build/${pkg}/coverage.lcov" ]; then
              python3 -m lcov_cobertura build/${pkg}/coverage.lcov -o coverage-py-${pkg}.xml
              echo "✅ Converted Python coverage for ${pkg} to XML"
            fi
          done
      
      # Generate Coverage Report for PR (using Cobertura XML)
      - name: Code Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: 'coverage-*.xml'
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'
      
      # Add coverage report to PR comment
      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md
      
      # Upload coverage reports as artifacts
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            */htmlcov/**
            build/*/coverage_html/**
            coverage_summary.txt
            coverage-*.xml
      
      # Create coverage badge (for README)
      - name: Create coverage badge
        if: always() && github.ref == 'refs/heads/jazzy-devel'
        run: |
          # Extract Python coverage percentage from lcov file
          echo "🔍 Searching for Python coverage files..."
          find . -name "coverage.lcov" -o -name ".coverage" 2>/dev/null | head -20
          
          # Extract Python coverage for all packages
          PY_TOTAL_LINES_HIT=0
          PY_TOTAL_LINES_FOUND=0
          
          for pkg in ${{ env.PY_PACKAGES }}; do
            echo "🔍 Checking Python coverage for: ${pkg}"
            PY_LCOV_FILE=""
            
            if [ -f "build/${pkg}/coverage.lcov" ]; then
              PY_LCOV_FILE="build/${pkg}/coverage.lcov"
              echo "✅ Found at: build/${pkg}/coverage.lcov"
            elif [ -f "${pkg}/coverage.lcov" ]; then
              PY_LCOV_FILE="${pkg}/coverage.lcov"
              echo "✅ Found at: ${pkg}/coverage.lcov"
            fi
            
            if [ -n "$PY_LCOV_FILE" ]; then
              PKG_LINES_HIT=$(grep -E "^LH:" "$PY_LCOV_FILE" | cut -d: -f2 | awk '{s+=$1} END {print s}')
              PKG_LINES_FOUND=$(grep -E "^LF:" "$PY_LCOV_FILE" | cut -d: -f2 | awk '{s+=$1} END {print s}')
              PY_TOTAL_LINES_HIT=$((PY_TOTAL_LINES_HIT + PKG_LINES_HIT))
              PY_TOTAL_LINES_FOUND=$((PY_TOTAL_LINES_FOUND + PKG_LINES_FOUND))
              echo "📊 ${pkg}: LH=$PKG_LINES_HIT, LF=$PKG_LINES_FOUND"
            fi
          done
          
          if [ "$PY_TOTAL_LINES_FOUND" -gt 0 ]; then
            PY_COV_PCT=$(awk "BEGIN {printf \"%.0f\", ($PY_TOTAL_LINES_HIT/$PY_TOTAL_LINES_FOUND)*100}")
            echo "✅ Total Python Coverage: $PY_COV_PCT%"
          else
            echo "⚠️ No Python coverage data found"
            PY_COV_PCT=0
          fi
          
          # Extract C++ coverage for all packages
          CPP_TOTAL_LINES_HIT=0
          CPP_TOTAL_LINES_FOUND=0
          
          source Docker/.env
          for pkg in ${{ env.CPP_PACKAGES }}; do
            echo "🔍 Checking C++ coverage for: ${pkg}"
            if [ -f "build/${pkg}/coverage_filtered.info" ]; then
              # Use --entrypoint to bypass the custom entrypoint
              PKG_COV_DATA=$(docker run --rm --entrypoint="" \
                -v ${{ github.workspace }}:/workspace \
                -w /workspace \
                ${BUILT_IMAGE} \
                bash -c "lcov --summary build/${pkg}/coverage_filtered.info 2>&1 | grep 'lines' || echo 'lines......: 0.0%'")
              
              PKG_LINES=$(echo "$PKG_COV_DATA" | grep -oP '\d+ of \d+' || echo '0 of 0')
              PKG_LINES_HIT=$(echo "$PKG_LINES" | cut -d' ' -f1)
              PKG_LINES_FOUND=$(echo "$PKG_LINES" | cut -d' ' -f3)
              
              CPP_TOTAL_LINES_HIT=$((CPP_TOTAL_LINES_HIT + PKG_LINES_HIT))
              CPP_TOTAL_LINES_FOUND=$((CPP_TOTAL_LINES_FOUND + PKG_LINES_FOUND))
              echo "📊 ${pkg}: Hit=$PKG_LINES_HIT, Total=$PKG_LINES_FOUND"
            fi
          done
          
          if [ "$CPP_TOTAL_LINES_FOUND" -gt 0 ]; then
            CPP_COV_PCT=$(awk "BEGIN {printf \"%.0f\", ($CPP_TOTAL_LINES_HIT/$CPP_TOTAL_LINES_FOUND)*100}")
            echo "✅ Total C++ Coverage: $CPP_COV_PCT%"
          else
            CPP_COV_PCT=0
          fi
          
          # Calculate average coverage
          TOTAL_PACKAGES=$(echo "${{ env.CPP_PACKAGES }} ${{ env.PY_PACKAGES }}" | wc -w)
          if [ "$PY_COV_PCT" -gt 0 ] || [ "$CPP_COV_PCT" -gt 0 ]; then
            AVG_COV=$(( (PY_COV_PCT + CPP_COV_PCT) / 2 ))
          else
            AVG_COV=0
          fi
          
          echo "📊 Coverage stats: Python: ${PY_COV_PCT}%, C++: ${CPP_COV_PCT}%, Average: ${AVG_COV}%"
          
          # Determine badge color
          if [ $AVG_COV -ge 80 ]; then
            COLOR="brightgreen"
          elif [ $AVG_COV -ge 60 ]; then
            COLOR="yellow"
          elif [ $AVG_COV -ge 40 ]; then
            COLOR="orange"
          else
            COLOR="red"
          fi
          
          # Create badge JSON
          echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"${AVG_COV}%\", \"color\": \"$COLOR\"}" > coverage-badge.json
          cat coverage-badge.json

      - name: Upload coverage badge data
        if: always() && github.ref == 'refs/heads/jazzy-devel'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage-badge.json
      
      # Publish badges to badges branch for shields.io endpoint
      - name: Publish badges to badges branch
        if: always() && github.ref == 'refs/heads/jazzy-devel'
        run: |
          # Determine branch name for badge directory
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            BRANCH_NAME="main"
          else
            BRANCH_NAME="jazzy-devel"
          fi
          
          # Setup git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch and checkout badges branch (create if doesn't exist)
          git fetch origin badges 2>/dev/null || true
          git checkout badges 2>/dev/null || git checkout --orphan badges
          
          # Clean working directory and create structure
          git rm -rf . 2>/dev/null || true
          mkdir -p ${BRANCH_NAME}
          
          # Copy badge files
          cp ${{ github.workspace }}/test-badge.json ${BRANCH_NAME}/ 2>/dev/null || echo "No test badge"
          cp ${{ github.workspace }}/coverage-badge.json ${BRANCH_NAME}/ 2>/dev/null || echo "No coverage badge"
          
          # Add, commit and push
          git add ${BRANCH_NAME}/
          git diff --staged --quiet || git commit -m "Update badges for ${BRANCH_NAME} [skip ci]"
          git push origin badges 2>/dev/null || git push --set-upstream origin badges

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag image for Docker Hub
        if: github.ref == 'refs/heads/jazzy-devel'
        run: |
          # Get the image name from .env file
          source Docker/.env
          DOCKERHUB_ORG=${{ secrets.DOCKERHUB_ORG }}
          
          # Tag the local image with Docker Hub organization name
          docker tag ${BUILT_IMAGE} ${DOCKERHUB_ORG}/eutrobai:${TARGET_DISTRO}
      
      - name: Push to Docker Hub
        if: github.ref == 'none' # IGNORE for now the push, replace it with main branch or jazzy when ready to publish from protected branch
        run: |
          source Docker/.env
          DOCKERHUB_ORG=${{ secrets.DOCKERHUB_ORG }}
          
          # Push the image to Docker Hub
          docker push ${DOCKERHUB_ORG}/eutrobai:${TARGET_DISTRO}