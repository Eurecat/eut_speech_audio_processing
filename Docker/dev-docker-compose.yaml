name: coghri_audio_dev

services:
  eut_audio_dev:
    container_name: "eut_audio_dev"
    network_mode: host 
    ipc: host
    shm_size: 1gb
    runtime: ${DOCKER_RUNTIME:-runc}
    image: ${BUILT_IMAGE}
    privileged: true
    # user: "coghri"  # User will be created in the entrypoint script
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.xauth_docker/share/:/tmp/xauth/
      - ./.vscode:/workspace/.vscode
      - ../src/audio_stream_manager:/workspace/src/audio_stream_manager
      - ../src/audio_stream_manager_interfaces:/workspace/src/audio_stream_manager_interfaces
      - ../src/speech_recognition:/workspace/src/speech_recognition
      - /dev:/dev
    tty: true
    stdin_open: true
    environment:
      # - USER_ID=${USER_ID}
      # - GROUP_ID=${GROUP_ID}
      # - USERNAME=${USERNAME}
      - NVIDIA_VISIBLE_DEVICES=all 
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/xauth/.docker.xauth     
      - HF_TOKEN=${HF_TOKEN}      

    devices:
      - /dev/dri:/dev/dri
      - /dev/snd:/dev/snd
      - /dev/bus/usb:/dev/bus/usb
    device_cgroup_rules:
      - 'c 180:* rwm'  # 180 is usb
      - 'c 189:* rwm' # 189 is usb_device

    # cap_add:
    #   - NET_RAW
    #   - NET_ADMIN
    # security_opt:
    #   - seccomp:unconfined
    command: bash -c "source /workspace/install/setup.bash && /bin/bash"
    entrypoint: ["/entrypoint.sh"]