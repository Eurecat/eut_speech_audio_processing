# ROS2 Parameters for Audio Capturing Node
# This file contains all the configurable parameters for the AudioCapturingNode

audio_capturing_automatic_device_node:
  ros__parameters:
    # Device Configuration
    device_name: "DJI"                      # Name or partial name of the audio input device to use
    dtype: "float32"                        # Audio data type (float32, int16, etc.)
    channels: 1                             # Number of audio channels to capture
    chunk: 512                              # Audio chunk size (number of samples per callback)
    target_samplerate: 16000                # Target sample rate for audio output (Hz)
    
    # Disconnection Detection
    disconnection_timeout: 3.0              # Time (seconds) before considering device disconnected
    disconnection_check_interval: 1.0       # Interval (seconds) between disconnection checks
    test_stream_duration: 0.1               # Duration (seconds) for testing device connectivity
    
    # Primary Device Recovery
    primary_device_check_interval: 5.0      # Interval (seconds) to check for primary device recovery

audio_to_mp3:
  ros__parameters:
    # Recording Output
    sample_rate: 16000                      # Sample rate of the recorded audio (Hz)
    temp_wav: "recording_temp.wav"          # Temporary WAV file path used during conversion
    output_mp3: "/workspace/src/audio_stream_manager/recording.mp3"  # Final MP3 output path
